name: CICD

# Triggers
on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

# Jobs
# Con una misma tuberia CI se pueden validar multiples confg. de entornos de ejecucion.
jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run lint
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
  
  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Build docker image
        run: docker build -t github-actions-workshop:latest . 

  docker-push:
    runs-n: ubuntu-latest
    needs: docker-build 
    
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Login in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_TOKEN}}
      - name: Extract Docker metadata
        uses: docker/metadata-action@v5
        with:
          images: $ {{ secrets.DOCKERHUB_USERNAME }}/github-actions-workshop
          tags: |
            type:raw,value=latest,enable={{is_default_branch}}
            type:ref,event=branch
            type:ref,event=tag
            type:sha
      - name: Build & Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platform: linux/amd64
          tags: ${{ steps.meta.output.tags }}
          labels: ${{ steps.meta.outputs.labels }}